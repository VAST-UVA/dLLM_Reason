name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # trigger on version tags like v1.2.3

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # Only publish from the canonical repo; forks/mirrors (e.g. VAST-UVA) skip.
    if: github.repository == 'BDeMo/dLLM_Reason'
    environment: pypi          # set up this environment in GitHub repo settings
    permissions:
      id-token: write          # required for PyPI trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Register the project on PyPI and configure the GitHub environment first:
        #   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
