# Default DAG Library config — all components enabled
library:
  enabled: true

  store:
    db_path: dag_library.db
    faiss_index_path: dag_library.faiss
    embedding_dim: 384

  retrieval:
    enabled: true
    channels: [semantic, structural, performance]
    top_k: 5
    semantic_model: all-MiniLM-L6-v2
    structural_metric: edit_distance
    performance_weight_decay: 0.95

  fusion:
    enabled: true
    strategy: weighted
    channel_weights:
      semantic: 0.5
      structural: 0.3
      performance: 0.2
    rrf_k: 60

  feedback:
    enabled: true
    sources: [auto, elo]
    auto_metric: accuracy
    elo_initial: 1500.0
    elo_k: 32.0
    human_scale: [1.0, 5.0]

  constraint:
    mode: hard
    soft_penalty_weight: 0.1

  merge:
    enabled: true
    strategy: weighted
    weighted_threshold: 0.5

  fitness:
    accuracy_weight: 0.5
    human_weight: 0.3
    structural_weight: 0.2
